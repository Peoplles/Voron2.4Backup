[gcode_macro PURGE]
variable_load_distance:  50
variable_purge_distance:  40

gcode:
  SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}  ; set timeout back to configured value
        {% if etemp > 0 %}
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET={etemp|int}                ; set extruder to print temperature
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={etemp|int - 4} MAXIMUM={etemp|int + 4}
        {% endif %}
  {% set speed = params.SPEED|default(300) %}
  {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 30 %}
  SAVE_GCODE_STATE NAME=purge_state
  G91
  G92 E0
  SET_DISPLAY_TEXT MSG="LOADING FILAMENT"
  G1 E{load_distance} F{max_velocity}          ; fast-load
  G1 E{purge_distance} F{speed}                ; purge
  RESTORE_GCODE_STATE NAME=purge_state

#####################################################################
# 	Filament Change
#####################################################################

[gcode_macro M600]

gcode:
    LCDRGB R=0 G=1 B=0  ; Turn LCD green
    # Parameters
    {% set z = params.Z|default(10)|int %}                                                   ; z hop amount

    {% if printer['pause_resume'].is_paused|int == 0 %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}                              ; set z hop variable for reference in resume macro
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target}    ; set hotend temp variable for reference in resume macro

        SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0                                  ; disable filament sensor
        SAVE_GCODE_STATE NAME=PAUSE                                                          ; save current print position for resume
        BASE_PAUSE                                                                           ; pause print
        {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}       ; check that zhop doesn't exceed z max
            G91                                                                              ; relative positioning
            G1 Z{z} F900                                                                     ; raise Z up by z hop amount
        {% else %}
            { action_respond_info("Pause zhop exceeds maximum Z height.") }                  ; if z max is exceeded, show message and set zhop value for resume to 0
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
        {% endif %}
        G90                                                                                  ; absolute positioning
        FORM_TIP                                                                              ; unload filament
        G4 P6000
        UNLOAD
        G1 X{55} Y{352} F6000                                                                ; park toolhead at front center
        SAVE_GCODE_STATE NAME=PAUSEPARK                                                      ; save parked position in case toolhead is moved during the pause (otherwise the return zhop can error)
        M104 S200                                                                            ; turn off hotend
        SET_IDLE_TIMEOUT TIMEOUT=43200                                                       ; set timeout to 12 hours
    {% endif %}


[gcode_macro FORM_TIP]
variable_ram_distance: 4                       # Distance to load filament into the extruder
variable_ram_speed: 10
variable_unloading_speed:18
variable_unloading_speed_start: 60
variable_cooling_tube_length: 10               #for Dragon HF Hotend
variable_cooling_tube_position: 30             #for Dragon HF
variable_extruder_eject_speed: 16
variable_parking_distance: 6
variable_cooling_moves: 2
variable_final_cooling_speed: 50
variable_initial_cooling_speed: 10
variable_nozzle_preheat_temp: 230

gcode:
    # Parameters and settings
    {% set target_temp = params.TARGET_TEMP|default(nozzle_preheat_temp) %}  # Target temperature for the nozzle
    {% set min_temp = params.MIN_TEMP|default(200) %}  # Minimum safe temperature for extrusion

    SAVE_GCODE_STATE NAME=form_tip

  {% set current_temp = printer.extruder.temperature %}
  {% set safe_temp = 230 %}

  # Check current temperature
  {% if current_temp >= 190 %}
  {% else %}
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=230
  SET_DISPLAY_TEXT MSG="HOTEND TO 230C"
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={230-4} MAXIMUM={200+60}
  {% endif %}

    G91 ; Set relative positioning for extrusion
    G92 E0 ; Reset extruder position
    
    #Step 1: Ram Filament
    G1 E{ram_distance} F{ram_speed * 60} ; Load filament at the specified loading speed
    
    #Step 2: Retract Filament
    {% set total_retraction_distance = cooling_tube_position + cooling_tube_length - 15 %}
    G1 E-15 F{1.0 * unloading_speed_start * 60} # Fixed default value from SS
    {% if total_retraction_distance > 0 %}
        G1 E-{(0.7 * total_retraction_distance)|round(2)} F{1.0 * unloading_speed * 60}
        G1 E-{(0.2 * total_retraction_distance)|round(2)} F{0.5 * unloading_speed * 60}
        G1 E-{(0.1 * total_retraction_distance)|round(2)} F{0.3 * unloading_speed * 60}
    {% endif %}
    #Step 3: Cool Tip
    {% set speed_inc = (final_cooling_speed - initial_cooling_speed) / (2 * cooling_moves - 1) %}
    {% for move in range(cooling_moves) %}
        {% set speed = initial_cooling_speed + speed_inc * move * 2 %}
        G1 E{cooling_tube_length} F{speed * 60}
        G1 E-{cooling_tube_length} F{(speed + speed_inc) * 60}
    {% endfor %}
    #Step 4: Burn String
    #Step 5: Park Filament
    G1 E-{parking_distance} F{extruder_eject_speed * 60}

    RESTORE_GCODE_STATE NAME=form_tip
  

  
#####################################################################
# 	Clean Nozzle
#####################################################################

[gcode_macro CLEAN_NOZZLE]
variable_start_x: 75
variable_start_y: 353
variable_start_z: 1.4
variable_wipe_dist: 50
variable_wipe_dist_y: 3
variable_wipe_qty: 4
variable_wipe_spd: 280
variable_raise_distance: 10

gcode:
  STATUS_CLEANING
 {% if "xyz" not in printer.toolhead.homed_axes %}
   G28
 {% endif %}
 
 G90                                            ; absolute positioning
 ## Move nozzle to start position
 G1 X{start_x} Y{start_y} F6000
 G1 Z{start_z} F1500

 ## Wipe nozzle
 {% for wipes in range(1, (wipe_qty + 1)) %}
   G1 X{start_x + wipe_dist} Y{start_y-wipe_dist_y} F{wipe_spd * 60}
   G1 X{start_x} Y{start_y} F{wipe_spd * 60}
 {% endfor %}

 ## Raise nozzle
 G1 Z{raise_distance}

#####################################################################
# 	Load/Unload Filament
#####################################################################

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  50
variable_purge_distance:  60
variable_purge_x: 55
variable_purge_y: 352
variable_purge_z: 15

gcode:
 {% if "xyz" not in printer.toolhead.homed_axes %}
   G28
 {% endif %}
  SAVE_GCODE_STATE NAME=load_state
  PURGE_PARK
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=230
  SET_DISPLAY_TEXT MSG="HOTEND TO 230C"
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={230-4} MAXIMUM={200+60}
  {% set speed = params.SPEED|default(300) %}
  {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 30 %}
  G91
  G92 E0
  SET_DISPLAY_TEXT MSG="LOADING FILAMENT"
  G1 E{load_distance} F{max_velocity}          ; fast-load
  G1 E{purge_distance} F{speed}                ; purge
  RESTORE_GCODE_STATE NAME=load_state
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
  TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=185
  CLEAN_NOZZLE

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  75
variable_purge_distance:  15
variable_purge_x: 55
variable_purge_y: 352
variable_purge_z: 10

gcode:
  FORM_TIP
  SAVE_GCODE_STATE NAME=unload_state
  G91
  G92 E0
  SET_DISPLAY_TEXT MSG="UNLOADING FILAMENT"
  M83                     # set extruder to relative extrusion
  G1 E-55 F1800           # splitting up E-80 to 2 commands, in order not to break max_extude_only_distance=50
  M82                     # set extruder to absolute extrusion
  #CLEAN_NOZZLE
  RESTORE_GCODE_STATE NAME=unload_state

#####################################################################
# 	PARKING GCODE
#####################################################################
[gcode_macro PURGE_PARK]
variable_purge_x: 55
variable_purge_y: 345
variable_purge_z: 8

gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
   G28
  {% endif %}
 
  G90                                            ; absolute positioning
  ## Move nozzle to start position
  G1 X{purge_x} Y{purge_y} F6000
  G1 Z{purge_z} F1500

# Park front center
[gcode_macro PARKFRONT]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                           ; home if not already homed
    {% endif %}
    SAVE_GCODE_STATE NAME=PARKFRONT
    G90                               ; absolute positioning
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} Z{printer.toolhead.axis_maximum.z/2} F6000        
    RESTORE_GCODE_STATE NAME=PARKFRONT



[gcode_macro OFF]
gcode:
    M84                                 ; turn steppers off
    TURN_OFF_HEATERS                    ; turn bed / hotend off
    M107                                ; turn print cooling fan off
    STATUS_OFF
    M106 P3 S0                          ; turn off exhaust fan
    BEDFANSOFF                          ; bed fan off
    SET_PIN PIN=caselight VALUE=0       ; turn case light off

[gcode_macro _CG28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

#####################################################################
#     Custom M106/107
#####################################################################
[gcode_macro M106]
#rename_existing:G106
gcode:
    {% set p = params.P|int if params.P is defined else 0 %}

    # Define your mapping here:
    {% if p == 3 %}
        {% set fan = "exhaust_fan" %}
    {% else %}
        {% set fan = "part_cooling_fan" %}
    {% endif %}

    {% set speed = (params.S|float / 255 if params.S is defined else 1.0) %}
    SET_FAN_SPEED FAN={fan} SPEED={speed}

[gcode_macro M107]
gcode:
    M106 S0
    
#####################################################################
#     Fans to Idle
#####################################################################
[gcode_macro START_FAN_TIMER]
gcode:
  {% set time = params.TIME|default(600)|float %}
  UPDATE_DELAYED_GCODE ID=STOP_FAN DURATION={time}

[delayed_gcode STOP_FAN]
gcode:
  M106 P3 S0
  BEDFANSOFF


[force_move]
enable_force_move: True
  